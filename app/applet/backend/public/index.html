<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pourify - Unified Web Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            teal: '#14B8A6', // Teal 500
                            blue: '#0EA5E9', // Sky 500
                            dark: '#0F172A', // Slate 900
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #f8fafc;
        }
        .metric-card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
        }
        .metric-card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="bg-brand-dark text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-brand-teal" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                    </svg>
                    <span class="font-bold text-2xl tracking-tight text-white">Pourify</span>
                </div>
                <div>
                    <span class="text-sm text-slate-300 font-semibold">Unified Dashboard</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-brand-dark">Overview</h1>
            <p class="text-slate-500 mt-1">Real-time metrics from the field operations.</p>
        </div>

        <!-- Skeleton Loader -->
        <div id="loader" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="metric-card animate-pulse">
                <div class="h-4 bg-slate-200 rounded w-1/2 mb-4"></div>
                <div class="h-8 bg-slate-300 rounded w-3/4"></div>
            </div>
            <div class="metric-card animate-pulse">
                <div class="h-4 bg-slate-200 rounded w-1/2 mb-4"></div>
                <div class="h-8 bg-slate-300 rounded w-3/4"></div>
            </div>
            <div class="metric-card animate-pulse">
                <div class="h-4 bg-slate-200 rounded w-1/2 mb-4"></div>
                <div class="h-8 bg-slate-300 rounded w-full"></div>
            </div>
        </div>

        <!-- Error State -->
        <div id="error-state" class="hidden bg-red-50 border-l-4 border-red-500 p-4 rounded">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="ml-3">
                    <p class="text-sm text-red-700 font-medium" id="error-message">
                        Unable to connect to the server.
                    </p>
                </div>
            </div>
        </div>

        <!-- Dashboard Metrics -->
        <div id="dashboard-content" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Card 1: Total Customers -->
            <div class="metric-card border-t-4 border-t-brand-teal">
                <div class="flex items-center mb-2">
                    <svg class="w-5 h-5 text-brand-teal mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide">Total Customers</h2>
                </div>
                <p id="metric-customers" class="text-4xl font-bold text-brand-dark">0</p>
            </div>

            <!-- Card 2: Total Receivable -->
            <div class="metric-card border-t-4 border-t-brand-blue">
                <div class="flex items-center mb-2">
                    <svg class="w-5 h-5 text-brand-blue mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide">Total Receivable</h2>
                </div>
                <p class="text-4xl font-bold text-brand-dark">PKR <span id="metric-receivable">0</span></p>
            </div>

            <!-- Card 3: Today's Operations -->
            <div class="metric-card border-t-4 border-t-slate-800">
                <div class="flex items-center mb-4">
                    <svg class="w-5 h-5 text-slate-800 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide">Today's Operations</h2>
                </div>
                <div class="flex justify-between items-center">
                    <div class="flex-1 text-center border-r border-slate-200">
                        <p class="text-sm font-medium text-emerald-600 mb-1">VERIFIED</p>
                        <p id="metric-verified" class="text-3xl font-bold text-brand-dark">0</p>
                    </div>
                    <div class="flex-1 text-center">
                        <p class="text-sm font-medium text-amber-500 mb-1">UNVERIFIED</p>
                        <p id="metric-unverified" class="text-3xl font-bold text-brand-dark">0</p>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
